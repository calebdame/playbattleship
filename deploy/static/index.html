<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Battleship</title>
<style>
body { font-family: Arial, sans-serif; }
#boards { display: flex; gap: 20px; }
table { border-collapse: collapse; }
td { width: 30px; height: 30px; border: 1px solid #333; text-align: center; cursor: pointer; }
.hit { background: red; }
.miss { background: #ccc; }
.ship { background: lightblue; }
.best { outline: 2px solid gold; }
</style>
</head>
<body>
<h1>Battleship</h1>
<div id="status"></div>
<div id="boards">
  <div>
    <h3>Your Board</h3>
    <table id="playerBoard"></table>
    <button id="rotateBtn">Rotate Ship</button>
  </div>
  <div>
    <h3>Enemy Board</h3>
    <table id="enemyBoard"></table>
  </div>
</div>
<script>
const boardSize = 10;
const shipLengths = [5,4,3,3,2];
let orientation = 'h';
let shipIndex = 0;
let placing = true;
let gameId = null;
let playerShips = [];
function buildBoard(table, clickFn){
  for(let y=0;y<boardSize;y++){
    const row = document.createElement('tr');
    for(let x=0;x<boardSize;x++){
      const cell=document.createElement('td');
      cell.dataset.x=x; cell.dataset.y=y;
      if(clickFn) cell.addEventListener('click', ()=>clickFn(x,y,cell));
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
}
function init(){
  buildBoard(document.getElementById('playerBoard'), placeClick);
  buildBoard(document.getElementById('enemyBoard'), guessClick);
  fetch('/api/new_game',{method:'POST'}).then(r=>r.json()).then(d=>{
    gameId=d.game_id;
    document.getElementById('status').innerText='Place your ships. Length '+shipLengths[shipIndex];
  });
}
function placeClick(x,y,cell){
  if(!placing) return;
  const len = shipLengths[shipIndex];
  const cells=[];
  for(let i=0;i<len;i++){
    const nx = orientation==='h'?x+i:x;
    const ny = orientation==='h'?y:y+i;
    if(nx>=boardSize||ny>=boardSize) return alert('Out of bounds');
    const c=document.querySelector(`#playerBoard td[data-x="${nx}"][data-y="${ny}"]`);
    if(c.classList.contains('ship')) return alert('Overlap');
    cells.push(c);
  }
  const coords=[];
  cells.forEach(c=>{c.classList.add('ship'); coords.push([+c.dataset.x,+c.dataset.y]);});
  playerShips.push(coords);
  shipIndex++;
  if(shipIndex<shipLengths.length){
    document.getElementById('status').innerText='Place ship length '+shipLengths[shipIndex];
  }else{
    placing=false;
    document.getElementById('status').innerText='Game starting...';
    fetch(`/api/${gameId}/set_ships`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ships:playerShips})}).then(()=>{
      updateState();
    });
  }
}
function guessClick(x,y,cell){
  if(placing) return;
  if(cell.classList.contains('hit')||cell.classList.contains('miss')) return;
  fetch(`/api/${gameId}/player_guess`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({x,y})}).then(r=>r.json()).then(d=>{
    updateState();
    if(d.turn==='computer' && !d.winner){
      compTurn();
    }
  });
}
function compTurn(){
  fetch(`/api/${gameId}/computer_turn`,{method:'POST'}).then(r=>r.json()).then(d=>{
    updateState();
    if(d.turn==='computer' && !d.winner){
      setTimeout(compTurn,500);
    }
  });
}
function clearBoard(table){
  table.querySelectorAll('td').forEach(td=>{td.className='';});
}
function updateState(){
  fetch(`/api/${gameId}/state`).then(r=>r.json()).then(s=>{
    document.getElementById('status').innerText = s.winner?(`${s.winner} won!`):(`Turn: ${s.turn}`);
    const pTable=document.getElementById('playerBoard');
    const eTable=document.getElementById('enemyBoard');
    clearBoard(pTable); clearBoard(eTable);
    s.player_ships.forEach(ship=>{ship.forEach(([x,y])=>{
      pTable.querySelector(`td[data-x="${x}"][data-y="${y}"]`).classList.add('ship');
    });});
    s.computer_hits.forEach(([x,y])=>{
      pTable.querySelector(`td[data-x="${x}"][data-y="${y}"]`).classList.add('hit');
    });
    s.computer_misses.forEach(([x,y])=>{
      pTable.querySelector(`td[data-x="${x}"][data-y="${y}"]`).classList.add('miss');
    });
    s.player_hits.forEach(([x,y])=>{
      eTable.querySelector(`td[data-x="${x}"][data-y="${y}"]`).classList.add('hit');
    });
    s.player_misses.forEach(([x,y])=>{
      eTable.querySelector(`td[data-x="${x}"][data-y="${y}"]`).classList.add('miss');
    });
    if(s.best_guess){
      eTable.querySelector(`td[data-x="${s.best_guess[0]}"][data-y="${s.best_guess[1]}"]`).classList.add('best');
    }
  });
}
document.getElementById('rotateBtn').addEventListener('click',()=>{
  orientation = orientation==='h'?'v':'h';
});
init();
</script>
</body>
</html>
